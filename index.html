<!doctype html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pfannä-Mannä — Coming Soon</title>
  <meta name="description" content="Pfannä-Mannä Üdike — coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #b22234;
      --red-light: #d4354a;
      --black: #1a1a1a;
      --charcoal: #333333;
      --gray: #777777;
      --line: rgba(26, 26, 26, 0.16);
      --bg: #f7f6f3;
      --card: rgba(255, 255, 255, 0.7);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--charcoal);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 56px;
      isolation: isolate;
    }

    .frame {
      position: absolute;
      inset: 38px;
      border: 1px solid var(--line);
      pointer-events: none;
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 760px;
      width: 100%;
      padding: 36px 24px;
      background: var(--card);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: 0 22px 50px rgba(0,0,0,0.045);
    }

    .logo {
      width: min(150px, 26vw);
      height: auto;
      display: block;
      margin: 0 auto 22px;
    }

    h1 {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.4rem, 7vw, 5.6rem);
      font-weight: 300;
      letter-spacing: 0.02em;
      color: var(--black);
      line-height: 1.04;
    }

    .dash {
      color: var(--red);
      font-weight: 400;
    }

    .subtitle {
      margin: 14px 0 0;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.15rem, 2.1vw, 1.45rem);
      font-weight: 400;
      color: var(--gray);
    }

    .divider {
      width: 44px;
      height: 1.5px;
      background: var(--red-light);
      margin: 24px auto 20px;
    }

    .coming-soon {
      font-size: 0.76rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      display: inline-block;
    }

    .note {
      margin: 18px auto 0;
      max-width: 510px;
      font-size: 0.96rem;
      line-height: 1.8;
      color: var(--gray);
      font-weight: 300;
    }

    .footer {
      position: absolute;
      left: 50%;
      bottom: 40px;
      transform: translate(-50%, 50%);
      z-index: 1;
      font-size: 0.84rem;
      letter-spacing: 0.03em;
      color: var(--gray);
      background: rgba(247,246,243,0.82);
      padding: 4px 10px;
    }

    @media (max-width: 900px) {
      .frame { inset: 24px; }
      .footer { bottom: 24px; }
    }

    @media (max-width: 640px) {
      .page {
        padding: 22px 16px 30px;
        min-height: 100svh;
      }

      .frame { inset: 16px; }

      .hero {
        padding: 26px 18px;
      }

      .footer {
        bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="frame" aria-hidden="true"></div>

    <section class="hero" aria-label="Coming soon">
      <img src="assets/pm-logo.png" alt="Pfannä-Mannä Logo" class="logo">
      <h1>Pfannä<span class="dash">-</span>Mannä</h1>
      <p class="subtitle">De Männer-Chochclub vo Üdike</p>
      <div class="divider" aria-hidden="true"></div>
      <div class="coming-soon">Coming Soon</div>
      <p class="note">Mir sind bald online.</p>
    </section>

    <div class="footer">Pfannä-Mannä Üdike</div>
  </main>
</body>
</html>
